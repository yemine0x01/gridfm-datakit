network:
  name: "IEEE14_m" # Name of the power grid network (without extension)
  source: "powsybl" # Data source for the grid; options: pglib, file
  # WARNING: the following parameter is only used if source is "file"
  network_dir: "scripts/grids" # if using source "file", this is the directory containing the network file (relative to the project root)
  file: "./tests/powsybl/grids/ieee14.m" # 

load:
  generator: "agg_load_profile" # Name of the load generator; options: agg_load_profile, powergraph
  agg_profile: "default" # Name of the aggregated load profile
  scenarios: 5 # Number of different load scenarios to generate
  # WARNING: the following parameters are only used if generator is "agg_load_profile"
  # if using generator "powergraph", these parameters are ignored
  sigma: 0.2 # max local noise
  change_reactive_power: true # If true, changes reactive power of loads. If False, keeps the ones from the case file
  global_range: 0.4 # Range of the global scaling factor. used to set the lower bound of the scaling factor
  max_scaling_factor: 4.0 # Max upper bound of the global scaling factor
  step_size: 0.05 # Step size when finding the upper bound of the global scaling factor
  start_scaling_factor: 0.8 # Initial value of the global scaling factor

topology_perturbation:
  type: "none" # Type of topology generator; options: n_minus_k, random, none
  # WARNING: the following parameters are only used if type is not "none"
  k: 2 # Maximum number of components to drop in each perturbation
  n_topology_variants: 2 # Number of unique perturbed topologies per scenario
  elements: [branch, gen] # elements to perturb. options: branch, gen

generation_perturbation:
  type: "cost_permutation" # Type of generation perturbation; options: cost_permutation, cost_perturbation, none
  # WARNING: the following parameter is only used if type is "cost_permutation"
  sigma: 1.0 # Size of range used for sampling scaling factor

admittance_perturbation:
  type: "random_perturbation" # Type of admittance perturbation; options: random_perturbation, none
  # WARNING: the following parameter is only used if type is "random_perturbation"
  sigma: 0.2 # Size of range used for sampling scaling factor

dynamic:
  dynamic_solver: "dynawo"
  # TODO: change to relative path
  input_files:
    dynamic_models_file: "/home/tren/Path2GridFM/gridfm-datakit/tests/dynawo/ieee14/ieee14_GeneratorDisconnections/model_mapping.csv"
    automation_systems_file: "/home/tren/Path2GridFM/gridfm-datakit/tests/dynawo/ieee14/ieee14_GeneratorDisconnections/automation_systems.csv"
    events_file: "/home/tren/Path2GridFM/gridfm-datakit/tests/dynawo/ieee14/ieee14_GeneratorDisconnections/event_mapping.csv"
    variables_file: "/home/tren/Path2GridFM/gridfm-datakit/tests/dynawo/ieee14/ieee14_GeneratorDisconnections/variable_mapping.csv"
  
  solver_parameters: # Dynawo / pypowsybl.dynamic solver parameters
    solver_type: "SIM" # SIM (simplified) or IDA.
    start_time: 0.0
    stop_time: 10.0
    precision: 1.0e-6

  output_dir: "./data_out/dynamic"

settings:
  num_processes: 1 # Number of parallel processes to use
  data_dir: "./tests/powsybl/data/generated_test_data" # Directory to save generated data relative to the project root
  large_chunk_size: 5 # Number of load scenarios processed before saving
  overwrite: true # If true, overwrites existing files, if false, appends to files
  mode: "pf" # Mode of the script; options: pf, opf. pf: power flow data where one or more operating limits – the inequality constraints defined in OPF, e.g., voltage magnitude or branch limits – may be violated. opf:  generates datapoints for training OPF solvers, with cost-optimal dispatches that satisfy all operating limits (OPF-feasible)
  include_dc_res: true # If true, also stores the results of dc power flow or dc optimal power flow
  enable_solver_logs: false # If true, write OPF/PF logs to {data_dir}/solver_log; PF fast and DCPF fast do not log.
  pf_fast: false # Whether to use fast PF solver by default (compute_ac_pf from powermodels.jl); if false, uses Ipopt-based PF. Some networks (typically large ones e.g. case10000_goc) do not work with pf_fast: true. pf_fast is faster and more accurate than the Ipopt-based PF.
  dcpf_fast: false # Whether to use fast DCPF solver by default (compute_dc_pf from PowerModels.jl)
  max_iter: 200 # Max iterations for Ipopt-based solvers
  pf_solver: "powsybl" # Solver to use for power flow calculations; options: "powsybl", "powermodel"
  seed: 49455 # Seed for random number generation. If null, a random seed is generated (RECOMMENDED). To get the same data across runs, set the seed and note that ALL OTHER PARAMETERS IN THE CONFIG FILE MUST BE THE SAME.
  